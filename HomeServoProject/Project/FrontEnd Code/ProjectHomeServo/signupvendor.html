<!-- vendor sign-up -->
<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <title>Vendor signup</title>
   <link rel="stylesheet" href="./css/signupvendor.css">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
   </head>
<body>
  <div class="container">
    <div class="title">Vendor Sign up</div>
    <div class="content">
      <form action="#">
        <div class="user-details">
          <div class="input-box">
            <span class="details">Name</span>
            <input type="text" placeholder="Enter your name" required>
          </div>
          <div class="input-box">
            <span class="details">Email</span>
            <input type="email" placeholder="Enter your Email" required>
          </div>
          <div class="input-box">
            <span class="details">Phone</span>
            <input type="tel" placeholder="Enter your phone number" required>
          </div>
          <div class="input-box">
            <span class="details">Password</span>
            <input type="password" placeholder="Enter the password" required>
          </div>
          <div class="input-box">
            <span class="details">Cost per day</span>
            <input type="number" placeholder="Enter the cost per day" required>
          </div>
          
        </div>
        <div class="title">Address</div>
        <div class="user-details">
            <div class="input-box">
              <span class="details">Door Number</span>
              <input type="text" placeholder="Enter the door number" required>
            </div>
            <div class="input-box">
              <span class="details">Street</span>
              <input type="text" placeholder="Enter the street" required>
            </div>
            <div class="input-box">
              <span class="details">Land Mark</span>
              <input type="text" placeholder="Enter the landmark" required>
            </div>
            <div class="input-box">
              <span class="details">District</span>
              <input type="text" placeholder="Enter the district" required>
            </div>
            <div class="input-box">
              <span class="details">State</span>
              <input type="text" placeholder="Enter the state" required>
            </div>
            <div class="input-box">
                <span class="details">Pin Code</span>
                <input type="number" placeholder="Enter the pin code" required>
              </div>
            
          </div>
        <div class="button">
          <input type="submit" value="Sign up">
        </div>
      </form>
    </div>
  </div>

</body>
</html>
